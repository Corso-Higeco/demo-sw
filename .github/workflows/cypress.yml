name: CI E2E
on:
  pull_request:
    branches: [main]      # verifica quando apri la PR verso main
  push:
    branches: [main]      # e di nuovo al merge su main
jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - uses: cypress-io/github-action@v6
        with:
          start: npm run dev          # avvia l'app
          wait-on: 'http://localhost:5173'
      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: e2e-video, path: cypress/videos }
